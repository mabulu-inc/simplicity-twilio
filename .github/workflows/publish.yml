# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    name: Test, build, and publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: npm

    steps:
      - name: Check out code at the release tag
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
        run: |
          set -euo pipefail
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Run gitleaks (full git history)
        run: gitleaks git . --no-banner --redact

      - name: Verify release tag matches package.json version
        run: |
          TAG="${GITHUB_REF##refs/tags/v}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Release tag v$TAG does not match package.json version $PKG"
            exit 1
          fi
          echo "Tag and package.json version match: $PKG"

      - name: Lint
        run: pnpm run lint

      - name: Type-check
        run: pnpm run typecheck

      - name: Run tests
        run: pnpm test

      - name: Build distribution
        run: pnpm run build

      - name: Publish to npm with provenance
        run: npm publish --provenance --access public
