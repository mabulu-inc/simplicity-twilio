# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint, type-check, gitleaks, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          # gitleaks needs the full git history.
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Type-check
        run: pnpm run typecheck

      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
        run: |
          set -euo pipefail
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Run gitleaks (full git history)
        run: gitleaks git . --no-banner --redact

      - name: Run tests
        run: pnpm test

      - name: Build distribution
        run: pnpm run build

      # Advisory: warn (don't fail) when a direct dep has a newer
      # release on npm than what's installed. Catches "typescript-eslint
      # 9 just dropped" before we discover it at upgrade time. Runs
      # last because it's the lowest-priority check — actual test or
      # build failures should surface first.
      - name: Check for outdated direct dependencies (non-blocking)
        run: |
          set +e
          OUTPUT=$(pnpm outdated --long 2>&1)
          STATUS=$?
          if [ $STATUS -ne 0 ]; then
            echo "::warning title=Outdated dependencies::One or more direct dependencies have newer releases on npm. Run 'pnpm outdated --long' locally to see the diff and 'pnpm up --latest' to upgrade."
            echo "$OUTPUT"
          else
            echo "All direct dependencies on latest."
          fi
